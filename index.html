---
layout: default
---

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <p class="post-meta">{{ post.date | date: "%B %-d, %Y" }}</p>
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <p class="post-excerpt">{{ post.excerpt }}</p>
    <a class="read-more" href="{{ post.url }}">Read more</a>
  </li>
  {% endfor %}
</ul>
